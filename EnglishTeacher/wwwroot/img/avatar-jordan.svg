  <circle cx="32.5" cy="32" r="2.2" fill="#1c1c1c"/>
  <circle cx="47.5" cy="32" r="2.2" fill="#1c1c1c"/>
  <circle cx="33.2" cy="31.3" r="0.8" fill="white"/>
  <circle cx="48.2" cy="31.3" r="0.8" fill="white"/>
  <!-- Confident slight smile -->
  <path d="M35 40 Q40 43 45 40" stroke="#8e44ad" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Target decoration -->
  <circle cx="67" cy="13" r="8" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.8"/>
  <circle cx="67" cy="13" r="4.5" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <circle cx="67" cy="13" r="1.5" fill="#ffd700" opacity="0.9"/>
  <!-- Sparkles -->
