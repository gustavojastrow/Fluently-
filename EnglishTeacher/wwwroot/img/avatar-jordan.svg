  <rect x="27" y="28" width="11" height="8" rx="4" fill="none" stroke="#c0a000" stroke-width="1.8"/>
  <!-- Glasses frame right -->
  <rect x="42" y="28" width="11" height="8" rx="4" fill="none" stroke="#c0a000" stroke-width="1.8"/>
  <!-- Glasses bridge -->
  <path d="M38 32 Q40 31 42 32" stroke="#c0a000" stroke-width="1.5" fill="none"/>
