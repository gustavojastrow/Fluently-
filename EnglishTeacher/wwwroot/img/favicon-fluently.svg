<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Mortarboard top (diamond/cap shape) -->
  <polygon points="32,10 58,22 32,34 6,22" fill="white" opacity="0.95"/>
  <!-- Cap board edge -->
  <line x1="32" y1="34" x2="32" y2="46" stroke="white" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>
  <!-- Diploma scroll bottom -->
  <rect x="22" y="44" width="20" height="10" rx="3" fill="white" opacity="0.85"/>
  <line x1="26" y1="48" x2="36" y2="48" stroke="#764ba2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="51" x2="36" y2="51" stroke="#764ba2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tassel string -->
  <line x1="57" y1="22" x2="57" y2="36" stroke="white" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="57" cy="39" r="4" fill="#ffd700"/>
  <!-- AI dots (small sparkles) -->
  <circle cx="12" cy="48" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="8"  cy="56" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="18" cy="56" r="2"   fill="white" opacity="0.45"/>
</svg>
